{extend name="layout" /}
{block name="content"}
<div class="search-form">
    <div class="layui-inline">
        <input type="text" id="search-keyword" placeholder="名称/条码/分类" class="layui-input" value="{$keyword|default=''}">
    </div>
    <div class="layui-inline">
        <select id="search-cate">
            <option value="">全部分类</option>
            <option value="_none_" {if isset($cate) && $cate==='_none_'}selected{/if}>无分类</option>
            {foreach $cateList as $c}
            <option value="{$c.name}" {if isset($cate) && $cate===$c.name}selected{/if}>{$c.name}</option>
            {/foreach}
        </select>
    </div>
    <div class="layui-inline">
        <button class="layui-btn layui-btn-primary" onclick="doSearch()"><i class="layui-icon layui-icon-search"></i> 搜索</button>
    </div>
    <div class="btn-group-right">
        <button class="layui-btn layui-btn-primary" onclick="openEdit()"><i class="layui-icon layui-icon-add-1"></i> 新增商品</button>
        <button class="layui-btn layui-btn-primary" onclick="openImport()"><i class="layui-icon layui-icon-upload-drag"></i> Excel导入</button>
        <button class="layui-btn layui-btn-primary" onclick="downloadTemplate()"><i class="layui-icon layui-icon-download-circle"></i> 下载模板</button>
        <button class="layui-btn layui-btn-primary" onclick="exportData()"><i class="layui-icon layui-icon-export"></i> 导出</button>
        <button class="layui-btn layui-btn-normal" id="btn-batch-cate">批量改分类</button>
    </div>
</div>
<table id="goods-table" lay-filter="goodsTable"></table>

<script type="text/html" id="toolbar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
{/block}

{block name="script"}
<script>
var goodsList = {:json_encode($list, JSON_UNESCAPED_UNICODE)};
var goodsCateList = {:json_encode($cateList, JSON_UNESCAPED_UNICODE)};
var selectedIds = {};

layui.use(['table', 'upload', 'form'], function(){
    var table = layui.table;
    table.render({
        elem: '#goods-table',
        data: goodsList,
        cols: [[
            {type: 'checkbox'},
            {field: 'id', title: 'ID', width: 60},
            {field: 'name', title: '名称', width: 140},
            {field: 'barcode', title: '条码', width: 130},
            {field: 'unit', title: '单位', width: 60},
            {field: 'box_spec', title: '箱规', width: 60, templet: function(d){ return d.box_spec ? d.box_spec : '-'; }},
            {field: 'purchase_price', title: '进货价', width: 80},
            {field: 'retail_price', title: '零售价', width: 80},
            {field: 'stock', title: '库存', width: 80},
            {field: 'cate', title: '分类', width: 90},
            {field: 'create_time', title: '创建时间', width: 170, templet: function(d){
                return d.create_time ? new Date(d.create_time * 1000).toLocaleString() : '-';
            }},
            {title: '操作', toolbar: '#toolbar', width: 120}
        ]],
        page: false
    });

    table.on('checkbox(goodsTable)', function(obj){
        if (obj.type === 'all') {
            var allChecked = obj.checked;
            var currentData = layui.table.cache['goodsTable'] || goodsList;
            if (allChecked) {
                currentData.forEach(function(d){ selectedIds[d.id] = true; });
            } else {
                selectedIds = {};
            }
        } else if (obj.data && obj.data.id) {
            if (obj.checked) {
                selectedIds[obj.data.id] = true;
            } else {
                delete selectedIds[obj.data.id];
            }
        }
        var count = Object.keys(selectedIds).length;
        $('#btn-batch-cate').text('批量改分类' + (count > 0 ? '（' + count + '）' : ''));
    });

    table.on('tool(goodsTable)', function(obj){
        if (obj.event === 'edit') openEdit(obj.data);
        else if (obj.event === 'del') {
            layer.confirm('确认删除该商品？', function(index){
                $.post('/goods/delete', {id: obj.data.id}, function(res){
                    if (res.code === 0) { layer.msg(res.msg, {icon:1}); setTimeout(function(){ location.reload(); }, 500); }
                    else layer.msg(res.msg, {icon:2});
                });
                layer.close(index);
            });
        }
    });
});

$('#btn-batch-cate').on('click', function(){
    var ids = Object.keys(selectedIds);
    if (ids.length === 0) { layer.msg('请勾选商品'); return; }
    var cateOpts = goodsCateList.map(function(c){ return '<option value="' + c.name + '">' + c.name + '</option>'; }).join('');
    var html = '<div style="padding:20px;">\
        <div class="layui-form-item"><label class="layui-form-label">目标分类</label><div class="layui-input-block"><select id="batch-cate-select">' + cateOpts + '</select></div></div>\
        <div style="color:#999;margin-top:8px;">已选中 <strong>' + ids.length + '</strong> 个商品</div>\
    </div>';
    layer.open({
        type: 1, title: '批量修改分类', area: ['420px', '220px'], content: html,
        btn: ['确定', '取消'],
        yes: function(index, layero){
            var cate = $(layero).find('#batch-cate-select').val();
            if (!cate) { layer.msg('请选择分类'); return; }
            var loading = layer.load();
            $.post('/goods/batchCate', {ids: JSON.stringify(ids.map(Number)), cate: cate}, function(res){
                layer.close(loading);
                if (res.code === 0) {
                    layer.msg(res.msg, {icon:1});
                    setTimeout(function(){ location.reload(); }, 500);
                } else {
                    layer.msg(res.msg, {icon:2});
                }
            });
            layer.close(index);
        }
    });
});

window.openEdit = function(data){
    var isEdit = !!data;
    $.post('/goods/genBarcode', {}, function(res){
        var genBarcode = res.data.barcode;
        var html = '<div class="layui-form" style="padding:20px;">\
            <div class="layui-form-item"><label class="layui-form-label">名称</label><div class="layui-input-block"><input type="text" name="name" value="'+(isEdit?data.name:'')+'" class="layui-input"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">条码</label><div class="layui-input-inline"><input type="text" name="barcode" id="edit-barcode" value="'+(isEdit?data.barcode:genBarcode)+'" class="layui-input" '+(isEdit?'readonly':'')+'></div><div class="layui-input-inline" style="width:auto"><button class="layui-btn layui-btn-primary" onclick="genRandomBarcode()">随机生成</button></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">单位</label><div class="layui-input-block"><input type="text" name="unit" value="'+(isEdit?data.unit||'':'')+'" class="layui-input" placeholder="如：瓶、箱、个"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">箱规</label><div class="layui-input-block"><input type="number" name="box_spec" value="'+(isEdit&&data.box_spec?data.box_spec:'')+'" class="layui-input" placeholder="每箱含多少散件，如 24"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">进货价</label><div class="layui-input-block"><input type="number" step="0.01" name="purchase_price" value="'+(isEdit?data.purchase_price:'')+'" class="layui-input"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">零售价</label><div class="layui-input-block"><input type="number" step="0.01" name="retail_price" value="'+(isEdit?data.retail_price:'')+'" class="layui-input"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">分类</label><div class="layui-input-block"><select name="cate"><option value="">请选择分类</option>' + goodsCateList.map(function(c){ return '<option value="' + c.name + '" ' + (isEdit && data.cate === c.name ? 'selected' : '') + '>' + c.name + '</option>'; }).join('') + '</select></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">库存下限</label><div class="layui-input-block"><input type="number" name="stock_min" value="'+(isEdit&&data.stock_min?data.stock_min:'')+'" class="layui-input"></div></div>\
            <div class="layui-form-item"><label class="layui-form-label">库存上限</label><div class="layui-input-block"><input type="number" name="stock_max" value="'+(isEdit&&data.stock_max?data.stock_max:'')+'" class="layui-input"></div></div>\
        </div>';
        layer.open({
            type: 1, title: isEdit ? '编辑商品' : '新增商品', area: ['550px', '540px'], content: html,
            btn: ['保存', '取消'],
            success: function(){ layui.form.render('select'); },
            yes: function(index, layero){
                var form = layui.$(layero).find('.layui-form');
                var postData = {
                    id: isEdit ? data.id : 0,
                    name: form.find('[name=name]').val(),
                    barcode: form.find('[name=barcode]').val(),
                    unit: form.find('[name=unit]').val(),
                    box_spec: form.find('[name=box_spec]').val(),
                    purchase_price: form.find('[name=purchase_price]').val(),
                    retail_price: form.find('[name=retail_price]').val(),
                    cate: form.find('[name=cate]').val(),
                    stock_min: form.find('[name=stock_min]').val(),
                    stock_max: form.find('[name=stock_max]').val()
                };
                if (!postData.name) { layer.msg('请输入名称'); return; }
                if (!postData.barcode) { layer.msg('请输入条码'); return; }
                var url = isEdit ? '/goods/edit' : '/goods/add';
                $.post(url, postData, function(res){
                    if (res.code === 0) { layer.msg(res.msg, {icon:1}); setTimeout(function(){ location.reload(); }, 500); }
                    else layer.msg(res.msg, {icon:2});
                });
                layer.close(index);
            }
        });
    });
};

window.genRandomBarcode = function(){
    $.post('/goods/genBarcode', {}, function(res){
        $('#edit-barcode').val(res.data.barcode);
    });
};

window.openImport = function(){
    var html = '<div style="padding:20px;"><div class="layui-upload-drag" id="import-upload">\
        <i class="layui-icon layui-icon-upload-drag"></i><div>点击上传或将文件拖拽到这里</div>\
    </div><div id="import-result" style="margin-top:10px;"></div></div>';
    layer.open({
        type: 1, title: 'Excel导入商品', area: ['500px', '350px'], content: html,
        success: function(layero){
            layui.use('upload', function(){
                layui.upload.render({
                    elem: '#import-upload',
                    url: '/goods/import',
                    accept: 'file',
                    exts: 'xls|xlsx',
                    done: function(res){
                        if (res.code === 0) {
                            var html = '成功：' + res.data.success + ' 条，失败：' + res.data.fail + ' 条';
                            if (res.data.details.length > 0) html += '<br>' + res.data.details.join('<br>');
                            $('#import-result').html('<div style="padding:10px;border:1px solid #ddd;border-radius:3px;">' + html + '</div>');
                        } else {
                            $('#import-result').html('<div style="color:red;">' + res.msg + '</div>');
                        }
                    }
                });
            });
        }
    });
};

window.downloadTemplate = function(){ location.href = '/goods/downloadTemplate'; };
window.exportData = function(){ location.href = '/goods/export'; };
window.doSearch = function(){
    var keyword = $('#search-keyword').val();
    var cate = $('#search-cate').val();
    location.href = '/goods/index?keyword=' + encodeURIComponent(keyword) + '&cate=' + encodeURIComponent(cate);
};
</script>
{/block}
