<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 便利店零售管理系统</title>
    <link rel="stylesheet" href="{__LAYUI__}/css/layui.css">
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-wrap { width: 400px; }
        .login-card { background: #fff; padding: 40px 40px 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .login-card h2 { text-align: center; margin-bottom: 30px; color: #333; font-size: 24px; }
        .login-card .layui-input-block { margin-left: 0; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <h2>便利店零售管理系统</h2>
        <form class="layui-form">
            <div class="layui-form-item">
                <input type="text" name="username" lay-verify="required" placeholder="请输入账号" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-item">
                <input type="password" name="password" lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
            </div>
            <div class="layui-form-item">
                <button lay-submit lay-filter="login" class="layui-btn layui-btn-fluid" style="background-color:#5FB878;">登 录</button>
            </div>
        </form>
    </div>
</div>
<script src="{__LAYUI__}/layui.js"></script>
<script>
layui.use(['form'], function(){
    var form = layui.form;
    var $ = layui.$;

    form.on('submit(login)', function(data){
        $.ajax({
            url: '/login/doLogin',
            type: 'POST',
            data: data.field,
            dataType: 'json',
            success: function(res){
                if (res.code === 0) {
                    layer.msg(res.msg, {icon: 1}, function(){
                        window.location.href = '/index/index';
                    });
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
            }
        });
        return false;
    });
});
</script>
</body>
</html>
