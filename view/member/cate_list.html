{extend name="layout" /}
{block name="content"}
<div class="toolbar">
    <button class="layui-btn layui-btn-primary" onclick="openCateEdit()"><i class="layui-icon layui-icon-add-1"></i> 新增分类</button>
</div>
<table id="cate-table" lay-filter="cateTable"></table>

<script type="text/html" id="toolbar">
    <a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>
    <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
</script>
{/block}

{block name="script"}
<script>
var cateList = {:json_encode($list, JSON_UNESCAPED_UNICODE)};

layui.use(['table'], function(){
    var table = layui.table;
    table.render({
        elem: '#cate-table',
        data: cateList,
        cols: [[
            {field: 'id', title: 'ID', width: 60},
            {field: 'name', title: '名称', width: 120},
            {field: 'discount', title: '折扣率', width: 100, templet: function(d){ return (d.discount * 100).toFixed(0) + '%'; }},
            {title: '操作', toolbar: '#toolbar', width: 140}
        ]],
        page: false
    });

    table.on('tool(cateTable)', function(obj){
        if (obj.event === 'edit') openCateEdit(obj.data);
        else if (obj.event === 'del') {
            layer.confirm('确认删除？', function(index){
                $.post('/member/cateDelete', {id: obj.data.id}, function(res){
                    if (res.code === 0) { layer.msg(res.msg, {icon:1}); setTimeout(function(){ location.reload(); }, 500); }
                    else layer.msg(res.msg, {icon:2});
                });
                layer.close(index);
            });
        }
    });
});

window.openCateEdit = function(data){
    var isEdit = !!data;
    var html = '<div class="layui-form" style="padding:20px;">\
        <div class="layui-form-item"><label class="layui-form-label">名称</label><div class="layui-input-block"><input type="text" name="name" value="'+(isEdit?data.name:'')+'" class="layui-input"></div></div>\
        <div class="layui-form-item"><label class="layui-form-label">折扣率</label><div class="layui-input-block"><input type="number" step="0.01" name="discount" value="'+(isEdit?data.discount:'1')+'" placeholder="0.95 表示 95折" class="layui-input"></div></div>\
    </div>';
    layer.open({
        type: 1, title: isEdit ? '编辑分类' : '新增分类', area: ['400px', '220px'], content: html,
        btn: ['保存', '取消'],
        yes: function(index, layero){
            var form = layui.$(layero).find('.layui-form');
            var postData = {id: isEdit ? data.id : 0, name: form.find('[name=name]').val(), discount: form.find('[name=discount]').val()};
            if (!postData.name) { layer.msg('请输入名称'); return; }
            var url = isEdit ? '/member/cateEdit' : '/member/cateAdd';
            $.post(url, postData, function(res){
                if (res.code === 0) { layer.msg(res.msg, {icon:1}); setTimeout(function(){ location.reload(); }, 500); }
                else layer.msg(res.msg, {icon:2});
            });
            layer.close(index);
        }
    });
};
</script>
{/block}
